name: Speech2Text
options:
  bundleIdPrefix: com.speech2text
  deploymentTarget:
    macOS: "26.0"
  groupSortPosition: top
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "1.0.0"
  # Test-only: runtime introspection of SwiftUI view bodies. Linked into the
  # unit-test bundle only — never into the app target.
  ViewInspector:
    url: https://github.com/nalexn/ViewInspector.git
    from: "0.10.3"
targets:
  Speech2Text:
    type: application
    platform: macOS
    sources: [Speech2Text]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.speech2text.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: Speech2Text.entitlements
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: WhisperKit
        product: WhisperKit
    scheme:
      testTargets:
        - Speech2TextTests
        - Speech2TextIntegrationTests

  Speech2TextTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Speech2TextTests]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.speech2text.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Speech2Text
      - package: ViewInspector

  Speech2TextIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Speech2TextIntegrationTests]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.speech2text.integrationtests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Speech2Text

  # End-to-end UI automation. XCUIApplication is XCTest-only — this is the one
  # target that uses XCTest rather than the repo's Swift Testing convention.
  # Kept out of the main scheme's test action (see the Speech2TextUITests scheme
  # below) so its TCC/launch flakiness can't gate every build.
  Speech2TextUITests:
    type: bundle.ui-testing
    platform: macOS
    sources: [Speech2TextUITests]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.speech2text.uitests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Speech2Text
        # XcodeGen's test-target preset injects BUNDLE_LOADER = "$(TEST_HOST)", which
        # belongs to unit-test bundles, not a ui-testing runner (a separate process).
        # TEST_HOST is undefined here so it already expands to empty, but suppress it
        # explicitly so the generated project never implies in-process loading.
        BUNDLE_LOADER: ""
    dependencies:
      - target: Speech2Text

# A dedicated, shared scheme for the UI tests so the default
# `-scheme Speech2Text test` run never pulls them in. Run explicitly with
# `-scheme Speech2TextUITests test`.
schemes:
  Speech2TextUITests:
    build:
      targets:
        Speech2Text: [run]
        Speech2TextUITests: [test]
    test:
      targets:
        - Speech2TextUITests
