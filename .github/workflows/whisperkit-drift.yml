name: WhisperKit Drift Check

# WhisperKit is pinned to `from: "1.0.0"` (see project.yml) — up-to-next-major, so
# upstream can ship a new 1.x release that breaks our build at any time. This weekly
# job re-resolves to the latest release within the pinned major, builds + tests, and
# either opens a PR (still green → bump Package.resolved) or files an issue tagging
# @claude (broken → needs adapting).
#
# NOTE: `from:` never crosses a major boundary, so a new major (e.g. v2.0.0) is NOT
# picked up here — that requires a manual `from:` bump in project.yml. This check
# covers 1.x drift only.
#
# GITHUB_TOKEN limits (intentional — no PAT): both the PR and the issue below are
# created with the Actions token, so GitHub's loop-prevention means the PR carries
# NO status checks of its own (the build + test ran in THIS job, not on the PR) and
# the issue's "@claude" mention does NOT auto-summon the bot. A maintainer reviews /
# re-runs CI on the PR, and re-invokes @claude on the issue.
on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

# Serialize drift runs so a manual dispatch racing the weekly cron can't both
# pass the open-PR dedup check and open duplicate PRs. Queue (not cancel) so an
# in-flight build+test finishes.
concurrency:
  group: whisperkit-drift
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  XCODE_PROJECT: Speech2Text.xcodeproj
  XCODE_SCHEME: Speech2Text
  RESOLVED: Speech2Text.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved

jobs:
  drift:
    runs-on: macos-26
    timeout-minutes: 24   # uncached HF model download + resolve + build + integration test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install build tools
        run: brew install xcodegen xcbeautify

      - name: Generate project
        run: xcodegen generate

      - name: Resolve to latest WhisperKit release
        id: resolve
        # Drift can break package RESOLUTION (new swift-tools-version, transitive
        # conflict, yanked release), not just the build. continue-on-error keeps the
        # job green so the verify step's `if: steps.resolve.outcome == 'success'` gate
        # works and the outcome checks below can route a resolve failure to the issue
        # path (the File-issue step uses always(), so it fires even on a hard failure).
        continue-on-error: true
        run: |
          set -o pipefail
          # Drop the pinned Package.resolved first: a plain resolve honors the
          # existing pin and would never advance to a newer release, so the drift
          # check would never actually see drift. Removing it forces re-resolution
          # to the newest release allowed by `from:` (latest within the major).
          rm -f "$RESOLVED"
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" | xcbeautify

      - name: Build & test against latest release
        id: verify
        # Skip the doomed build if resolution already failed (handled below).
        if: steps.resolve.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" \
            -configuration Debug -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO build | xcbeautify
          # Un-gate the end-to-end WhisperKit suite (downloads the ~75 MB tiny model
          # and actually transcribes) — otherwise the drift check would only prove
          # WhisperKit still *compiles*, not that it still *runs*, which is the whole
          # point of catching upstream drift. xcodebuild forwards env vars prefixed
          # TEST_RUNNER_ to the test process with the prefix stripped (→ RUN_WHISPERKIT_TESTS).
          TEST_RUNNER_RUN_WHISPERKIT_TESTS=1 \
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO test | xcbeautify

      - name: Open PR (still green)
        if: steps.resolve.outcome == 'success' && steps.verify.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- "$RESOLVED"; then
            echo "WhisperKit release unchanged since last resolve — nothing to do."
            exit 0
          fi
          # Don't stack drift PRs: if a previous week's bump is still open, leave it.
          # (Mirrors the issue-path dedup below.)
          existing=$(gh pr list --state open \
            --search "WhisperKit release bump (drift check) in:title" \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Open drift PR #$existing already exists — skipping."
            exit 0
          fi
          branch="chore/whisperkit-drift-${{ github.run_id }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add "$RESOLVED"
          git commit -m "chore: bump WhisperKit to latest release (drift check)"
          git push origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "chore: WhisperKit release bump (drift check passed)" \
            --body "Automated weekly WhisperKit drift check. A newer release within the pinned major (\`from: \"1.0.0\"\`) is available and the app still **builds + tests green** against it (verified in the drift job — note this bot-opened PR carries no status checks of its own; re-run CI or push a commit if branch protection requires them). Merging keeps \`Package.resolved\` current."

      - name: File issue (drift broke the check)
        # always() + "anything but the fully-green path" so a CANCELLED verify
        # (timeout/infra) AND a failure in an earlier step (checkout/brew/xcodegen,
        # which abort the job) still file/append the issue instead of silently
        # producing neither a PR nor an issue.
        if: always() && (steps.resolve.outcome != 'success' || steps.verify.outcome != 'success')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="WhisperKit release drift broke the check"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Drift check failed again — run: $run_url"
            exit 0
          fi
          gh issue create --title "$title" --body "$(printf '%s\n' \
            'The weekly WhisperKit drift check failed: resolving, building, or testing against the latest `argmaxinc/WhisperKit` release (within the pinned major) no longer passes — likely upstream API drift.' \
            '' \
            "Run logs: $run_url" \
            '' \
            'A maintainer should investigate (this issue was filed by the Actions token, which GitHub does not let trigger workflows, so the bot is not auto-invoked). Comment "@claude" here to dispatch it to adapt our WhisperKit usage to the upstream changes.')"
