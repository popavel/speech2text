name: Claude Code Review

# Automatic MAX-effort review of every PR: runs the multi-agent `/code-review`
# skill and posts its findings as inline PR comments. Static review (no build),
# on a cheap Linux runner.
#
# Auth: uses a Claude subscription (Pro/Max) via an OAuth token, NOT a pay-as-you-go
# API key. Generate it locally with `claude setup-token` and store it as the repo
# secret CLAUDE_CODE_OAUTH_TOKEN (Settings → Secrets and variables → Actions).
#
# Cost note: `max` fans out many subagents on EVERY push (synchronize). If that
# gets too heavy, drop `synchronize` from the triggers (review only on `opened`)
# or lower the effort level.
on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - 'feature/**'
      - main

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with Claude (max effort)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Run the multi-agent review skill at max effort and post inline PR
          # comments. Project rules (Swift Testing, @MainActor / strict concurrency,
          # one-way state flow) come from AGENTS.md, which the skill's agents read.
          prompt: |
            /code-review max --comment ${{ github.event.pull_request.number }}
          claude_args: |
            --allowedTools "Task,Agent,Bash,Read,Grep,Glob"
