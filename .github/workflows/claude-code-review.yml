name: Claude Code Review

# Automatic review of every PR: runs the `/code-review` command (the version
# bundled with claude-code-action) and posts its findings as inline PR comments.
# Static review (no build), on a cheap Linux runner.
#
# Auth: uses a Claude subscription (Pro/Max) via an OAuth token, NOT a pay-as-you-go
# API key. Generate it locally with `claude setup-token` and store it as the repo
# secret CLAUDE_CODE_OAUTH_TOKEN (Settings → Secrets and variables → Actions).
#
# Cost note: the review fans out subagents on EVERY push (synchronize). The
# concurrency block below cancels a superseded review when a new push lands; if it
# is still too heavy, drop `synchronize` from the triggers (review only on `opened`).
#
# Fork PRs: this uses `pull_request` (NOT `pull_request_target`), so a PR from a fork
# runs with no secrets and a read-only token — the review silently no-ops on forks.
# That is intentional: `pull_request_target` would run untrusted fork code with our
# secrets. Same-repo (feature/**) PRs are the supported path.
on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - 'feature/**'
      - main

# One review per PR; a new push cancels the in-flight (now stale) review.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip machine-authored PRs (e.g. the weekly dependency-drift PR opened by
    # github-actions[bot]): claude-code-action@v1 refuses bot actors, and a drift
    # PR only bumps Package.resolved (already built + tested green in the drift job),
    # so a static review adds ~nothing. Keeps the upstream bot guard intact and burns
    # no subscription tokens on machine PRs.
    if: github.event.pull_request.user.type != 'Bot'
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Run the review command and post inline PR comments. The bundled
          # /code-review has no effort levels, so no `max` argument. Project rules
          # (Swift Testing, @MainActor / strict concurrency, one-way state flow)
          # come from AGENTS.md, which the review reads.
          # The mcp__github_inline_comment__create_inline_comment tool MUST be
          # allowed — /code-review posts inline findings through it.
          prompt: |
            /code-review --comment ${{ github.event.pull_request.number }}
          claude_args: |
            --allowedTools "Task,Agent,Bash,Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment"
