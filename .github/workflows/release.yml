name: Release

# When should this workflow run?
on:
  push:
    branches:
      - 'release/**'   # runs on pushes to any release/<name> branch

  # Disabled for now to save CI minutes. Re-enable by uncommenting these
  # lines (they sit at the `on:` level, so they restore cleanly).
  # pull_request:        # runs on PRs targeting any release/<name> branch
  #   branches:
  #     - 'release/**'

  workflow_dispatch:   # lets you trigger it manually from the Actions tab

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Shared build-and-test job (see build-and-test.yml).
  build-and-test:
    uses: ./.github/workflows/build-and-test.yml

  # Shared WhisperKit integration job (see integration-whisperkit.yml). Runs
  # after build-and-test passes.
  integration-whisperkit:
    name: Integration (WhisperKit)
    needs: build-and-test
    uses: ./.github/workflows/integration-whisperkit.yml
