name: Feature

# When should this workflow run?
#
# Push-only — deliberately NO `pull_request:` trigger. A push-event check attaches to
# the branch head SHA, which is also the head commit of any feature/chore -> main PR,
# so the push run's checks already satisfy the `main protection` ruleset's required
# contexts on that PR (verified: the gate worked this way before a pull_request trigger
# was briefly added). Re-adding `pull_request:` fires a SECOND run for the same commit;
# the concurrency group below then cancels one of the pair, leaving a `cancelled`
# required check on the PR head that blocks the merge. main.yml and release.yml are
# push-only for the same reason.
on:
  push:
    branches:
      - 'feature/**'   # runs on pushes to any feature/<feature-name> branch
      - 'chore/**'     # runs on pushes to any chore/<chore-name> branch
  workflow_dispatch:   # lets you trigger it manually from the Actions tab

# Cancel a superseded in-flight run when a newer commit is pushed to the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Shared build-and-test job (see build-and-test.yml).
  build-and-test:
    uses: ./.github/workflows/build-and-test.yml

  # Shared WhisperKit integration job (see integration-whisperkit.yml). Runs
  # after build-and-test passes.
  integration-whisperkit:
    name: Integration (WhisperKit)
    needs: build-and-test
    uses: ./.github/workflows/integration-whisperkit.yml

  # Shared XCUITest UI job (see ui-tests.yml). Signed run; gated on build-and-test
  # so a signed runner only spins up once the cheap build+test is green.
  ui-tests:
    name: UI Tests (XCUITest)
    needs: build-and-test
    uses: ./.github/workflows/ui-tests.yml
