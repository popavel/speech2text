name: Claude Fix

# Auto-fix step in a HUMAN-IN-THE-LOOP loop. A trusted maintainer (a person —
# never the review bot) comments "@claude fix" on a PR, or replies it to an inline
# review comment. In ONE run this workflow:
#   1. applies the open review findings,
#   2. builds + tests them (green gate — a broken fix is NOT pushed),
#   3. pushes the fix to the PR branch,
#   4. re-runs the review.
# Doing build/test/review inline means NO PAT is needed: we don't rely on the
# push to re-trigger other workflows (GitHub suppresses workflow triggers from
# GITHUB_TOKEN pushes). It's the CI-side mirror of the local /precommit loop.
#
# Runs on macOS because it builds the Xcode project. The commit is made by a
# run-step (a workflow command, not a Claude tool call) so the repo's
# .claude/settings.json commit guard doesn't intercept it.
#
# Model auth: subscription OAuth token in the CLAUDE_CODE_OAUTH_TOKEN repo secret.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

# Serialize fixes per PR. cancel-in-progress: false (not true) so a queued second
# "@claude fix" waits for the first to finish and push — its fresh `gh pr checkout`
# then sees that push, avoiding a non-fast-forward collision on the parallel pushes.
concurrency:
  group: claude-fix-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

env:
  XCODE_PROJECT: Speech2Text.xcodeproj
  XCODE_SCHEME: Speech2Text

jobs:
  # Cheap ubuntu gate: keep false `@claude fix` matches off the expensive macOS
  # runner. The job-level `if:` is the (expression-only) author_association
  # allowlist; the step does the word-boundary match that `contains()` can't —
  # so "@claude fixate", "@claude fixes", and negated mentions do NOT trigger.
  gate:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association))
    outputs:
      proceed: ${{ steps.match.outputs.proceed }}
      pr: ${{ steps.match.outputs.pr }}
    steps:
      - name: Match "@claude fix" on a word boundary
        id: match
        # Body via env (not inlined) to avoid shell injection from comment text.
        env:
          BODY: ${{ github.event.comment.body || github.event.review.body }}
          PR: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          if printf '%s' "$BODY" | grep -Eiq '(^|[^[:alnum:]_])@claude[[:space:]]+fix([^[:alnum:]_]|$)'; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "pr=$PR" >> "$GITHUB_OUTPUT"

  fix:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out the PR branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr checkout ${{ needs.gate.outputs.pr }}

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install build tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Apply fixes with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            A maintainer commented "@claude fix" on this pull request. Address the
            open review findings:
            1. Read the unresolved review comments and the PR diff (`gh pr view`
               with `--comments`, `gh api`, `gh pr diff`).
            2. Apply the smallest correct fix for each actionable finding. Edit
               source — never weaken or delete a test. Follow AGENTS.md (Swift
               Testing style, @MainActor / strict-concurrency rules, one-way state
               flow off TranscriptionManager).
            3. If a finding is wrong, do NOT change code for it.
            Do NOT run git, commit, or push — later workflow steps build, commit,
            and re-review your edits.
          claude_args: |
            --allowedTools "Edit,Write,Read,Grep,Glob,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh api:*)"

      # Did Claude actually edit anything? If not, skip the (expensive) build,
      # commit, and re-review entirely — every finding was judged not actionable.
      - name: Detect changes
        id: changes
        run: |
          # --porcelain reports untracked files too (a fix may ADD a new
          # source/test file); plain `git diff` misses those, silently dropping
          # the fix. Gitignored model blobs are not reported, so they don't count.
          if [ -z "$(git status --porcelain)" ]; then
            echo "dirty=false" >> "$GITHUB_OUTPUT"
            echo "No edits from Claude — skipping build/commit/re-review."
          else
            echo "dirty=true" >> "$GITHUB_OUTPUT"
          fi

      # Green gate: a fix that doesn't build or pass tests fails the job here and
      # is never pushed (mirrors /precommit's "green before commit").
      - name: Build & test the fix
        if: steps.changes.outputs.dirty == 'true'
        run: |
          set -o pipefail
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" \
            -configuration Debug -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO build | xcbeautify
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO test | xcbeautify

      - name: Commit & push the fix
        if: steps.changes.outputs.dirty == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: apply @claude review fixes"
          git push

      - name: Re-review with Claude
        if: steps.changes.outputs.dirty == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Bundled /code-review has no effort levels (no `max`); it posts inline
          # findings via the github_inline_comment MCP tool, which must be allowed.
          prompt: |
            /code-review --comment ${{ needs.gate.outputs.pr }}
          claude_args: |
            --allowedTools "Task,Agent,Bash,Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment"
