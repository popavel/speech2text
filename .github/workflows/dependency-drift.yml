name: Dependency Drift Check

# Our SwiftPM dependencies are pinned with `from:` constraints (see project.yml):
# WhisperKit `from: "1.0.0"` and ViewInspector `from: "0.10.3"`, plus their
# transitives (e.g. swift-argument-parser). `from:` is up-to-next-major, so any of
# them can ship a newer release within its pinned major that breaks our build at any
# time. This weekly job drops Package.resolved and re-resolves the WHOLE graph to the
# latest release each `from:` allows, builds + tests, and either opens a PR (still
# green → bump Package.resolved) or files an issue tagging @claude (broken → needs
# adapting).
#
# NOTE: `from:` never crosses a major boundary, so a new major of ANY dependency
# (e.g. WhisperKit v2.0.0) is NOT picked up here — that requires a manual `from:`
# bump in project.yml. This check covers within-major drift only.
#
# GITHUB_TOKEN limits (intentional — no PAT): both the PR and the issue below are
# created with the Actions token, so GitHub's loop-prevention means the PR carries
# NO status checks of its own (the build + test ran in THIS job, not on the PR) and
# the issue's "@claude" mention does NOT auto-summon the bot. A maintainer reviews /
# re-runs CI on the PR, and re-invokes @claude on the issue.
on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

# Serialize drift runs so a manual dispatch racing the weekly cron can't both
# pass the open-PR dedup check and open duplicate PRs. Queue (not cancel) so an
# in-flight build+test finishes.
concurrency:
  group: dependency-drift
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  XCODE_PROJECT: Speech2Text.xcodeproj
  XCODE_SCHEME: Speech2Text
  RESOLVED: Speech2Text.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
  PINS_BEFORE: /tmp/pins.before.json

jobs:
  drift:
    runs-on: macos-26
    timeout-minutes: 24   # uncached HF model download + resolve + build + integration test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install build tools
        run: brew install xcodegen xcbeautify

      - name: Generate project
        run: xcodegen generate

      - name: Resolve to latest dependency releases
        id: resolve
        # Drift can break package RESOLUTION (new swift-tools-version, transitive
        # conflict, yanked release), not just the build. continue-on-error keeps the
        # job green so the verify step's `if: steps.resolve.outcome == 'success'` gate
        # works and the outcome checks below can route a resolve failure to the issue
        # path (the File-issue step uses always(), so it fires even on a hard failure).
        continue-on-error: true
        run: |
          set -o pipefail
          # Snapshot the current pins so the PR step can report what moved.
          # `if`-form (not `[ -f ] && cp || true`) so a cp failure isn't masked by
          # the test; keep `|| true` on cp so a transient /tmp write error stays
          # non-fatal (the PR step falls back to opening a PR if the snapshot is gone).
          if [ -f "$RESOLVED" ]; then cp "$RESOLVED" "$PINS_BEFORE" || true; fi
          # Drop the pinned Package.resolved first: a plain resolve honors the
          # existing pins and would never advance to newer releases, so the drift
          # check would never actually see drift. Removing it forces re-resolution
          # of the whole graph to the newest release each `from:` allows (latest
          # within each dependency's pinned major).
          rm -f "$RESOLVED"
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" | xcbeautify

      - name: Build & test against latest releases
        id: verify
        # Skip the doomed build if resolution already failed (handled below).
        if: steps.resolve.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" \
            -configuration Debug -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO build | xcbeautify
          # The default test pass exercises ViewInspector (the view-render suite) and
          # the rest of the graph. Additionally un-gate the end-to-end WhisperKit suite
          # (downloads the ~75 MB tiny model and actually transcribes) — otherwise the
          # drift check would only prove WhisperKit still *compiles*, not that it still
          # *runs*, which is the whole point of catching upstream drift. xcodebuild
          # forwards env vars prefixed TEST_RUNNER_ to the test process with the prefix
          # stripped (→ RUN_WHISPERKIT_TESTS).
          TEST_RUNNER_RUN_WHISPERKIT_TESTS=1 \
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO test | xcbeautify

      - name: Open PR (still green)
        if: steps.resolve.outcome == 'success' && steps.verify.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- "$RESOLVED"; then
            echo "Dependency pins unchanged since last resolve — nothing to do."
            exit 0
          fi
          # Don't stack drift PRs: if a previous week's bump is still open, leave it.
          # (Mirrors the issue-path dedup below.)
          existing=$(gh pr list --state open \
            --search "dependency drift bump (drift check) in:title" \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Open drift PR #$existing already exists — skipping."
            exit 0
          fi
          # Summarize which pins actually moved (identity: old → new) by diffing the
          # snapshot against the freshly resolved file. Only real version movement —
          # added, removed, or version-changed packages — counts; a metadata-only
          # churn (e.g. a different `originHash` with identical versions) yields no
          # lines. Revision/branch-pinned packages have a null `.state.version`; the
          # `!= null` guard keeps them from rendering a spurious "— → null".
          # `2>/dev/null || true` swallows a missing-snapshot jq error (→ empty).
          changes=$(jq -rn \
            --slurpfile before "$PINS_BEFORE" \
            --slurpfile after "$RESOLVED" '
              ($before[0].pins // []) as $b
              | ($after[0].pins // []) as $a
              | ($b | map({key: .identity, value: .state.version}) | from_entries) as $bm
              | ($a | map(.identity)) as $akeys
              | (
                  ($b[]
                   | select(([.identity] | inside($akeys)) | not)
                   | "- `\(.identity)`: \(.state.version // "—") → (removed)"),
                  ($a[]
                   | select((.state.version != null) and (($bm[.identity] // "—") != .state.version))
                   | "- `\(.identity)`: \($bm[.identity] // "—") → \(.state.version)")
                )
            ' 2>/dev/null || true)
          # Gate on a real change. If the snapshot is genuinely missing we can't tell,
          # so fall back to opening the PR; otherwise an empty summary means only
          # Package.resolved metadata churned — skip the no-op PR.
          if [ ! -f "$PINS_BEFORE" ]; then
            changes="(snapshot unavailable — see the \`Package.resolved\` diff in this PR)"
          elif [ -z "$changes" ]; then
            echo "Only Package.resolved metadata changed (e.g. originHash); no version drift — skipping PR."
            exit 0
          fi
          branch="chore/dependency-drift-${{ github.run_id }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add "$RESOLVED"
          git commit -m "chore: bump dependencies to latest releases (drift check)"
          git push origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "chore: dependency drift bump (drift check passed)" \
            --body "$(printf '%s\n' \
              'Automated weekly dependency drift check. Newer releases within the pinned majors (`from:` constraints in project.yml) are available and the app still **builds + tests green** against them (verified in the drift job — note this bot-opened PR carries no status checks of its own; re-run CI or push a commit if branch protection requires them). Merging keeps `Package.resolved` current.' \
              '' \
              '**Pins moved:**' \
              "$changes")"

      - name: File issue (drift broke the check)
        # always() + "anything but the fully-green path" so a CANCELLED verify
        # (timeout/infra) AND a failure in an earlier step (checkout/brew/xcodegen,
        # which abort the job) still file/append the issue instead of silently
        # producing neither a PR nor an issue.
        if: always() && (steps.resolve.outcome != 'success' || steps.verify.outcome != 'success')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Dependency drift broke the check"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Drift check failed again — run: $run_url"
            exit 0
          fi
          gh issue create --title "$title" --body "$(printf '%s\n' \
            'The weekly dependency drift check failed: resolving, building, or testing against the latest dependency releases (within their pinned majors — e.g. `argmaxinc/WhisperKit`, `nalexn/ViewInspector`) no longer passes — likely upstream API drift.' \
            '' \
            "Run logs: $run_url" \
            '' \
            'A maintainer should investigate (this issue was filed by the Actions token, which GitHub does not let trigger workflows, so the bot is not auto-invoked). Comment "@claude" here to dispatch it to adapt our dependency usage to the upstream changes.')"
