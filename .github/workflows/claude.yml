name: Claude

# Responds to "@claude" mentions in issues, PR comments, and reviews.
# Runs on macOS so Claude can actually regenerate, build, and test the project.
#
# Auth: uses a Claude subscription (Pro/Max) via an OAuth token, NOT a pay-as-you-go
# API key. Generate it locally with `claude setup-token` and store it as the repo
# secret CLAUDE_CODE_OAUTH_TOKEN (Settings → Secrets and variables → Actions).
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run when a TRUSTED user (repo owner, org member, or invited
    # collaborator) actually mentions @claude. The author_association guard stops
    # outsiders from invoking the bot and spending your subscription quota.
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: macos-26
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # So Claude can build/test the Xcode project if asked.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install build tools
        run: brew install xcodegen xcbeautify

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The repo's AGENTS.md is picked up automatically as project guidance.
          claude_args: |
            --allowedTools "Bash,Edit,Write,Read,Grep,Glob"
