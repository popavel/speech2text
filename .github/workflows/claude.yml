name: Claude

# Responds to "@claude" mentions in issues, PR comments, and reviews.
# Runs on macOS so Claude can actually regenerate, build, and test the project.
#
# Auth: uses a Claude subscription (Pro/Max) via an OAuth token, NOT a pay-as-you-go
# API key. Generate it locally with `claude setup-token` and store it as the repo
# secret CLAUDE_CODE_OAUTH_TOKEN (Settings → Secrets and variables → Actions).
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    # `opened` only — NOT `assigned`: the gate matches @claude in the issue
    # body/title, which is unchanged across (re)assignments, so `assigned` would
    # re-fire the macOS bot on every assignment of an @claude issue.
    types: [opened]

# One general-bot run per issue/PR.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  # Cheap ubuntu gate: only spin the macOS runner for a genuine, word-boundary
  # "@claude" mention that is NOT "@claude fix" (the fixer owns those). The
  # job-level `if:` is the (expression-only) author_association allowlist; the
  # step does the boundary matching that `contains()` cannot.
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 16
    if: |
      (github.event_name == 'issue_comment' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    outputs:
      proceed: ${{ steps.match.outputs.proceed }}
    steps:
      - name: Match a bare "@claude" mention (excluding "@claude fix")
        id: match
        # Text via env (not inlined) to avoid shell injection from user content.
        env:
          # A comment/review body can be a "> @claude" quote-reply; an issue
          # body/title cannot. Keep them separate so quote-stripping the body never
          # consumes the title (format()-joining them would put the title on the
          # body's last line, where a trailing quote line would strip it too).
          COMMENT_BODY: ${{ github.event.comment.body || github.event.review.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          mention='(^|[^[:alnum:]_])@claude([^[:alnum:]_]|$)'
          fix='(^|[^[:alnum:]_])@claude[[:space:]]+fix([^[:alnum:]_]|$)'
          # Strip quoted ("> ...") lines so a quote-reply doesn't re-trigger the bot.
          # The issues event has no comment body: match the (quote-stripped) issue
          # body PLUS the title on its own line, so a quoted last body line can't
          # swallow a title mention.
          if [ -n "$COMMENT_BODY" ]; then
            haystack=$(printf '%s\n' "$COMMENT_BODY" | grep -v '^[[:space:]]*>' || true)
          else
            body_unquoted=$(printf '%s\n' "$ISSUE_BODY" | grep -v '^[[:space:]]*>' || true)
            haystack=$(printf '%s\n%s' "$body_unquoted" "$ISSUE_TITLE")
          fi
          if printf '%s' "$haystack" | grep -Eiq "$mention" \
             && ! printf '%s' "$haystack" | grep -Eiq "$fix"; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  claude:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # So Claude can build/test the Xcode project if asked.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install build tools
        run: brew install xcodegen xcbeautify

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The repo's AGENTS.md is picked up automatically as project guidance.
          claude_args: |
            --allowedTools "Bash,Edit,Write,Read,Grep,Glob"
