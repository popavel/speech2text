name: Claude

# Responds to "@claude" mentions in issues, PR comments, and reviews.
# Runs on macOS so Claude can actually regenerate, build, and test the project.
#
# Auth: uses a Claude subscription (Pro/Max) via an OAuth token, NOT a pay-as-you-go
# API key. Generate it locally with `claude setup-token` and store it as the repo
# secret CLAUDE_CODE_OAUTH_TOKEN (Settings → Secrets and variables → Actions).
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

# One general-bot run per issue/PR.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  # Cheap ubuntu gate: only spin the macOS runner for a genuine, word-boundary
  # "@claude" mention that is NOT "@claude fix" (the fixer owns those). The
  # job-level `if:` is the (expression-only) author_association allowlist; the
  # step does the boundary matching that `contains()` cannot.
  gate:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    outputs:
      proceed: ${{ steps.match.outputs.proceed }}
    steps:
      - name: Match a bare "@claude" mention (excluding "@claude fix")
        id: match
        # Text via env (not inlined) to avoid shell injection from user content.
        # For `issues`, the mention may be in the body or the title.
        env:
          BODY: ${{ github.event.comment.body || github.event.review.body || format('{0} {1}', github.event.issue.body, github.event.issue.title) }}
        run: |
          mention='(^|[^[:alnum:]_])@claude([^[:alnum:]_]|$)'
          fix='(^|[^[:alnum:]_])@claude[[:space:]]+fix([^[:alnum:]_]|$)'
          if printf '%s' "$BODY" | grep -Eiq "$mention" \
             && ! printf '%s' "$BODY" | grep -Eiq "$fix"; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  claude:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: macos-26
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # So Claude can build/test the Xcode project if asked.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install build tools
        run: brew install xcodegen xcbeautify

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The repo's AGENTS.md is picked up automatically as project guidance.
          claude_args: |
            --allowedTools "Bash,Edit,Write,Read,Grep,Glob"
