name: UI Tests (XCUITest)

# Runs the XCUITest UI suite: launches the real app and drives it via
# accessibility identifiers. Must run SIGNED (no CODE_SIGNING_ALLOWED=NO) — an
# unsigned runner is killed before it can attach. Called by the feature/main/
# release pipelines via workflow_call; also dispatchable manually.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  XCODE_PROJECT: Speech2Text.xcodeproj
  XCODE_SCHEME: Speech2TextUITests

jobs:
  ui-tests:
    name: UI Tests (XCUITest)
    runs-on: macos-26
    timeout-minutes: 20        # UI-test hangs (TCC prompts / attach failures) must not burn the runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Install build tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run UI tests
        run: |
          set -o pipefail
          # -configuration Debug is explicit (not just the test-action default): the
          # UI-test seam is #if DEBUG, so a future switch to Release would silently
          # compile it out and the tests would launch an unseeded app.
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'platform=macOS' \
            test | xcbeautify
